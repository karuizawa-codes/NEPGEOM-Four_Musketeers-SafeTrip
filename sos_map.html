<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeTrip Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="sos_map.css">

</head>
<body>

<div class="controls">

    <input
        type="text"
        id="searchBox"
        placeholder="Search destination..."
    >

    <button onclick="searchLocation()">
        Search
    </button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView(
    [27.7172,85.3240],
    13
);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        attribution:"© OpenStreetMap"
    }
).addTo(map);

let sosAlerts = [];

let addMarkerMode = false;

const customLayer = L.layerGroup().addTo(map);


// ---------------- USER LOCATION ----------------

if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(
        position => {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            L.marker([lat,lng])
                .addTo(map)
                .bindPopup("You are here")
                .openPopup();

            map.setView([lat,lng],13);
        }
    );
}


// ---------------- LOAD SOS JSON ----------------

fetch("sos.json")
.then(response => response.json())
.then(data => {

    const entries =
        Array.isArray(data) ? data :
        data.sos || data.alerts || data.touristSpots || [];

    const cutoff =
        Date.now() - 30 * 60 * 1000;

    entries.forEach(entry => {

        let timestampValue = entry.timestamp;

        if(typeof timestampValue === "number" &&
           String(timestampValue).length === 10){
            timestampValue *= 1000;
        }

        const time = new Date(timestampValue);
        const ts = time.getTime();

        if(isNaN(ts) || ts < cutoff)
            return;

        const coords =
        entry.latitude !== undefined &&
        entry.longitude !== undefined
        ? [entry.latitude, entry.longitude]
        : null;

        if(!coords)
            return;

        const timeString = time.toLocaleString();

        const marker =
            L.marker(coords)
            .addTo(map)
            .bindPopup(
                `<b>SOS</b><br>${timeString}`
            );

        sosAlerts.push({
            query:
                `${timeString.toLowerCase()} ${coords[0]},${coords[1]}`,
            marker: marker
        });

    });

    if(sosAlerts.length === 0){
        console.log(
            "No SOS alerts in the last 30 minutes"
        );
    }

})
.catch(error => {
    console.error(error);
});


// ---------------- SEARCH ----------------

async function searchLocation(){

    const query =
        document
        .getElementById("searchBox")
        .value
        .trim();

    if(!query){
        alert("Enter a location");
        return;
    }

    try{

        const response =
            await fetch(
                `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`
            );

        const data = await response.json();

        if(data.length === 0){
            alert("Location not found");
            return;
        }

        const result = data[0];

        const lat = parseFloat(result.lat);
        const lon = parseFloat(result.lon);

        map.setView([lat, lon], 16);

        L.marker([lat, lon])
            .addTo(map)
            .bindPopup(result.display_name)
            .openPopup();

    }
    catch(err){
        console.error(err);
        alert("Search failed");
    }
}
</script>

</body>
</html>
