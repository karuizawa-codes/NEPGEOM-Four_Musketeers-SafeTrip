<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS Emergency Button</title>
<link rel="stylesheet" href="sos.css">
</head>
<body>

<div class="container">

    <h1>Emergency SOS</h1>

    <button class="sos-btn" onclick="sendSOS()">
        🚨 SOS
    </button>

    <div class="status" id="status">
        Press SOS in an emergency
    </div>

    <div class="location" id="location">
        Location not available
    </div>

</div>

<script>

function sendSOS(){

    const status = document.getElementById("status");
    const locationBox = document.getElementById("location");

    status.innerHTML = "Getting your location...";

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

            function(position){

                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                locationBox.innerHTML =
                `
                Latitude: ${lat}<br>
                Longitude: ${lng}<br><br>
                Your location has been sent to emergency contacts.
                `;

                const sosData = {
                    latitude: lat,
                    longitude: lng,
                    timestamp: Date.now()
                };

                fetch("http://localhost:3000/sos", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(sosData)
                })
                .then(response => response.json())
                .then(data => {

                    status.innerHTML =
                    "🚨 SOS Alert Sent Successfully!";

                })
                .catch(error => {

                    console.error(error);

                    status.innerHTML =
                    "Failed to send SOS alert.";

                });
            },
            
            function(error){
                status.innerHTML =
                "Unable to access location.";
            }

        );

    }else{
        status.innerHTML =
        "Geolocation not supported.";
    }

}

</script>

</body>
</html>
<script>
window.onload = function () {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            function(position) {
                console.log("Location Access Granted");

                console.log(
                    position.coords.latitude,
                    position.coords.longitude
                );
            },

            function(error) {
                console.log("Location Access Denied");
            }
        );

    } else {
        alert("Geolocation is not supported by this browser.");
    }

};
</script>
